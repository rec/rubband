site_name: rubband
site_description: Python bindings for Rubber Band audio pitch shifting and time stretching.
site_url: https://rec.github.io/rubband/
repo_url: https://github.com/rec/rubband
repo_name: rec/rubband

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - API: api.md
  - Building: building.md
  - Release: release.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            heading_level: 2
            members_order: source
            show_root_heading: true
            show_source: false

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
