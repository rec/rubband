site_name: rubband
site_description: Python bindings for Rubber Band audio pitch shifting and time stretching.
site_url: https://rec.github.io/rubband/
repo_url: https://github.com/rec/rubband
repo_name: rec/rubband

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - API: api.md
  - Building: building.md
  - Release: release.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            annotations_path: brief
            docstring_style: google
            filters:
              - "!^_"
            group_by_category: true
            heading_level: 2
            members_order: source
            separate_signature: true
            show_if_no_docstring: true
            show_root_full_path: false
            show_root_heading: true
            show_signature_annotations: true
            show_source: false
            show_symbol_type_heading: true
            signature_crossrefs: true

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
